services:
  - type: web
    name: bonusguard-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ENGINE_MODE
        value: live
      - key: CATALOG_MODE
        value: Solo prossimi giorni (veloce)
      - key: SISAL_MAX_WORKERS
        value: "6"
      - key: QUOTE_CACHE_TTL_SECONDS
        value: "120"
      - key: ALLOW_DEV_CREDIT_TOPUP
        value: "0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
